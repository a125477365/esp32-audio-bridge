; PlatformIO Project Configuration File
; ESP32 WiFi to S/PDIF Digital Audio Bridge

[env:esp32dev]
platform = espressif32 @ ^6.7.0
board = esp32-s3-devkitc-1
framework = arduino

; Monitor settings
monitor_speed = 115200

; Build flags - Enable USB CDC for ESP32-S3 serial output
build_flags = -DCORE_DEBUG_LEVEL=3 -DBOARD_HAS_PSRAM=0 -DARDUINO_USB_CDC_ON_BOOT=1

; Libraries
lib_deps =
 https://github.com/me-no-dev/ESPAsyncWebServer.git
 https://github.com/me-no-dev/AsyncTCP.git
 bblanchon/ArduinoJson@^7.0.0

; Partition table for web content
board_build.partitions = partitions.csv

; Filesystem for web content
board_build.filesystem = spiffs
